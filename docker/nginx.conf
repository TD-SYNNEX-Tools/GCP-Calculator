# Server block do container. Escuta na 8080 (WEBSITES_PORT no App Service)
# e roteia tudo para o front controller em /public/index.php.
server {
    listen 8080;
    listen [::]:8080;

    root /var/www/html/public;
    index index.php;

    location / {
        try_files $uri $uri/ /index.php?$args;
    }

    # Bloqueia acesso direto a arquivos sensíveis (defesa em profundidade).
    location ~* \.(env|ini|log|sql|md|lock|bak|dist)$ { deny all; }
    location ~ /\.(?!well-known)                      { deny all; }

    # Cabeçalhos de segurança (o index.php também os define).
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    location ~ [^/]\.php(/|$) {
        fastcgi_split_path_info ^(.+?\.php)(|/.*)$;
        fastcgi_pass 127.0.0.1:9000;
        include fastcgi_params;
        fastcgi_param HTTP_PROXY "";
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        fastcgi_param PATH_INFO $fastcgi_path_info;
        fastcgi_read_timeout 300;
        fastcgi_buffer_size 128k;
        fastcgi_buffers 4 256k;
        fastcgi_busy_buffers_size 256k;
    }
}
