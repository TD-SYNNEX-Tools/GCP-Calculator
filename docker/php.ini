; Configurações de PHP para produção no container.
; Erros nunca são exibidos ao usuário, mas SÃO registrados no stderr —
; assim o error_log() do index.php aparece no Log Stream do App Service.
display_errors = Off
display_startup_errors = Off
log_errors = On
error_log = /proc/self/fd/2

expose_php = Off
memory_limit = 256M
max_execution_time = 60
upload_max_filesize = 16M
post_max_size = 16M
date.timezone = America/Sao_Paulo
